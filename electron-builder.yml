appId: com.vibelens.app
productName: VibeLens
directories:
  output: dist
  buildResources: resources
files:
  - out/**/*
  - package.json
  - '!**/*.map'
  - '!node_modules/**/{test,__tests__,tests,example,examples,*.md}'
asarUnpack:
  - node_modules/keytar/**/*
mac:
  category: public.app-category.developer-tools
  target:
    - target: dir
      arch:
        - arm64
  identity: null
  hardenedRuntime: false
  gatekeeperAssess: false
